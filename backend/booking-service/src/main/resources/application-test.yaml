spring:
  datasource:
    url: jdbc:h2:mem:booking-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
      operation-timeout: 1

booking:
  relay:
    enabled: false