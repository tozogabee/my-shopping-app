name: Inventory Service CI

on:
  push:
    paths:
      - 'backend/inventory-service/**'
      - 'backend/pom.xml'
      - '.github/workflows/inventory-service-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/inventory-service/**'
      - 'backend/pom.xml'
      - '.github/workflows/inventory-service-ci.yml'

jobs:
  build-and-test:
    name: Build, Test & Coverage Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests and coverage check
        working-directory: backend
        run: mvn verify -pl inventory-service -am --batch-mode

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/inventory-service/target/surefire-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/inventory-service/target/site/jacoco/
          retention-days: 7